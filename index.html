<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário Escolar Inteligente</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 id="tituloTabela">Diário Escolar</h1>

<!-- ===================================================== -->
<!-- MENU PRINCIPAL                                         -->
<!-- ===================================================== -->
<div class="menu-container" id="menuPrincipal">

    <!-- 1. CONFIGURAÇÕES -->
    <div class="dropdown">
        <button class="btn-menu" data-dropdown>⚙️ Configurações</button>
        <div class="dropdown-content">
            <div class="input-group">
                <label>Título da Planilha</label>
                <input type="text" id="tituloInput" placeholder="Novo título">
                <button class="btn-full" onclick="alterarTitulo()">Alterar título</button>
            </div>
            <hr>
            <div class="input-group">
                <label>Média de Aprovação</label>
                <input type="number" id="mediaCorte" value="5.0" min="0" max="10" step="0.1">
            </div>
        </div>
    </div>

    <!-- 2. IMPRESSÃO -->
    <div class="dropdown">
        <button class="btn-menu" data-dropdown>🖨️ Impressão</button>
        <div class="dropdown-content">
            <div class="input-group">
                <label>Orientação</label>
                <select id="cfgOrientacao">
                    <option value="landscape">A4 Paisagem</option>
                    <option value="portrait">A4 Retrato</option>
                </select>
            </div>
            <div class="input-group">
                <label>Margem</label>
                <select id="cfgMargem">
                    <option value="5mm">5 mm</option>
                    <option value="8mm">8 mm</option>
                    <option value="12mm">12 mm</option>
                    <option value="20mm">20 mm</option>
                </select>
            </div>
            <div class="input-group">
                <label class="label-inline">
                    <input type="checkbox" id="cfgMostrarObs">
                    Incluir Observações na impressão
                </label>
            </div>
            <button class="btn-full primario" onclick="imprimirA4()">Imprimir A4</button>
        </div>
    </div>

    <!-- 3. AÇÕES RÁPIDAS -->
    <div class="dropdown">
        <button class="btn-menu" data-dropdown>⚡ Ações Rápidas</button>
        <div class="dropdown-content">
            <div class="input-group">
                <label>Novo Aluno</label>
                <input type="text" id="novoAluno" placeholder="Nome completo">
                <button class="btn-full primario" onclick="adicionarAluno()">Adicionar</button>
            </div>
            <hr>
            <div class="input-group">
                <label>Nova Atividade</label>
                <input type="text" id="novaAtividade" placeholder="Ex: P1, Trabalho…">
                <button class="btn-full primario" onclick="adicionarAtividade()">Adicionar</button>
            </div>
            <hr>
            <div class="input-group">
                <label>Adição em Massa de Alunos</label>
                <textarea id="alunosEmMassa"
                    placeholder="Um nome por linha:&#10;Ana&#10;Carlos&#10;Marina"></textarea>
                <button class="btn-full primario" onclick="adicionarAlunosEmMassa()">Adicionar em massa</button>
            </div>
        </div>
    </div>

    <!-- 4. ARQUIVOS -->
    <div class="dropdown">
        <button class="btn-menu" data-dropdown>💾 Arquivos</button>
        <div class="dropdown-content">
            <button class="btn-full primario" onclick="exportarJSONTotal()">Exportar (.json)</button>
            <hr>
            <div class="input-group">
                <label>Importar Backup</label>
                <input type="file" id="importarArquivo">
                <button class="btn-full" onclick="importarArquivoJSON()">Importar Arquivo</button>
            </div>
            <hr>
            <div class="input-group">
                <label>Importar JSON Colado</label>
                <textarea id="jsonPaste" placeholder="Cole o JSON aqui"></textarea>
                <button class="btn-full" onclick="importarJSONColado()">Importar Colado</button>
            </div>
        </div>
    </div>

</div>

<!-- ===================================================== -->
<!-- BUSCA + FILTROS                                        -->
<!-- ===================================================== -->
<div class="barra-busca">
    <input type="text" id="buscaRapida" placeholder="Busca rápida por nome do aluno…">

    <button id="btnAprovacao" onclick="alternarFiltroAprovacao()">
        Filtrar aprovação
    </button>

    <button id="btnSemNota" onclick="alternarFiltroSemNota()">
        Estudantes sem nota
    </button>
</div>

<!-- ===================================================== -->
<!-- TABELA                                                 -->
<!-- ===================================================== -->
<div class="container">
<table id="tabela"></table>
</div>

<div class="rodape-estatisticas" id="rodapeEstatisticas">
    <span class="estat estat-total">Total: <strong id="estatTotal">0</strong></span>
    <span class="estat estat-aprovados">Aprovados: <strong id="estatAprovados">0</strong></span>
    <span class="estat estat-reprovados">Reprovados: <strong id="estatReprovados">0</strong></span>
    <span class="estat estat-media-corte">Média de corte: <strong id="estatCorte">5.0</strong></span>
</div>

<!-- ===================================================== -->
<!-- SCRIPTS                                                -->
<!-- ===================================================== -->
<script src="js/storage.js"></script>
<script src="js/validacao.js"></script>
<script src="js/teclado.js"></script>
<script src="js/tabela.js"></script>
<script src="js/importacao.js"></script>
<script src="js/exportacao.js"></script>
<script src="js/impressao.js"></script>
<script src="js/app.js"></script>

</body>
</html>
