<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário Escolar Inteligente</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 id="tituloTabela">Diário Escolar</h1>

<!-- ===================================================== -->
<!-- CONTROLES                                              -->
<!-- ===================================================== -->
<div class="controls">

    <input type="text" id="tituloInput" placeholder="Novo título">
    <button onclick="alterarTitulo()">Alterar título</button>

    <input type="text" id="novoAluno" placeholder="Novo aluno">
    <button onclick="adicionarAluno()">Adicionar aluno</button>

    <input type="text" id="novaAtividade" placeholder="Nova atividade">
    <button onclick="adicionarAtividade()">Adicionar atividade</button>

    <button onclick="imprimirA4()">Imprimir A4</button>

    <button onclick="exportarJSON()">Exportar JSON</button>
    <button onclick="exportarJSONTotal()">Exportar Total JSON</button>

    <input type="file" id="importarArquivo">
    <button onclick="importarArquivoJSON()">Importar Arquivo JSON</button>

</div>

<!-- ===================================================== -->
<!-- ADIÇÃO EM MASSA                                        -->
<!-- ===================================================== -->
<div class="json-area">
<textarea id="alunosEmMassa"
    placeholder="Adição em massa de alunos — um nome por linha:&#10;Ana&#10;Carlos&#10;Marina"></textarea>
<button onclick="adicionarAlunosEmMassa()" style="margin-top:10px;">
    Adicionar alunos em massa
</button>
</div>

<!-- ===================================================== -->
<!-- PAINEL DE IMPRESSÃO                                    -->
<!-- ===================================================== -->
<div class="painel-impressao">

    <label>
        Orientação
        <select id="cfgOrientacao">
            <option value="landscape">A4 Paisagem</option>
            <option value="portrait">A4 Retrato</option>
        </select>
    </label>

    <label>
        Margem
        <select id="cfgMargem">
            <option value="5mm">5 mm</option>
            <option value="8mm">8 mm</option>
            <option value="12mm">12 mm</option>
            <option value="20mm">20 mm</option>
        </select>
    </label>

    <label style="flex-direction:row;align-items:center;gap:8px;">
        <input type="checkbox" id="cfgMostrarObs" style="width:auto;">
        Mostrar Observações na impressão
    </label>

</div>

<!-- ===================================================== -->
<!-- JSON COLADO                                            -->
<!-- ===================================================== -->
<div class="json-area">
<textarea id="jsonPaste" placeholder="Cole o JSON aqui"></textarea>
<button onclick="importarJSONColado()" style="margin-top:10px;">
    Importar JSON Colado
</button>
</div>

<!-- ===================================================== -->
<!-- BUSCA + FILTROS                                        -->
<!-- ===================================================== -->
<div class="barra-busca">
    <input type="text" id="buscaRapida" placeholder="Busca rápida por nome do aluno…">

    <label class="campo-media">
        Média
        <input type="number" id="mediaCorte" value="5.0" min="0" max="10" step="0.1">
    </label>

    <button id="btnAprovacao" onclick="alternarFiltroAprovacao()">
        Filtrar aprovação
    </button>

    <button id="btnSemNota" onclick="alternarFiltroSemNota()">
        Estudantes sem nota
    </button>
</div>

<!-- ===================================================== -->
<!-- TABELA                                                 -->
<!-- ===================================================== -->
<div class="container">
<table id="tabela"></table>
</div>

<!-- ===================================================== -->
<!-- SCRIPTS                                                -->
<!-- ===================================================== -->
<script src="js/storage.js"></script>
<script src="js/validacao.js"></script>
<script src="js/teclado.js"></script>
<script src="js/tabela.js"></script>
<script src="js/importacao.js"></script>
<script src="js/exportacao.js"></script>
<script src="js/impressao.js"></script>
<script src="js/app.js"></script>

</body>
</html>
